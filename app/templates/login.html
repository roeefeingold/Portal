<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Risk Portal</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif; background: #1a1a2e; color: #eee;
            min-height: 100vh; display: flex; align-items: center; justify-content: center;
        }
        .login-box {
            background: #16213e; padding: 40px; border-radius: 12px;
            border: 1px solid #0f3460; width: 350px; text-align: center;
        }
        .login-box h2 { color: #e94560; margin-bottom: 25px; }
        .login-box input {
            width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #333;
            border-radius: 6px; background: #1a1a2e; color: #eee; font-size: 1rem;
        }
        .login-box button {
            width: 100%; padding: 12px; background: #e94560; color: #fff;
            border: none; border-radius: 6px; font-size: 1rem; cursor: pointer;
        }
        .login-box button:hover { background: #c0392b; }
        .flash { color: #e94560; margin-bottom: 15px; }
        a { color: #888; text-decoration: none; display: block; margin-top: 15px; }
    </style>
</head>
<body>
    <div class="login-box">
        <h2>Admin Login</h2>
        {% with messages = get_flashed_messages() %}
        {% if messages %}
            {% for msg in messages %}
                <div class="flash">{{ msg }}</div>
            {% endfor %}
        {% endif %}
        {% endwith %}
        <form method="POST">
            <input type="password" name="password" placeholder="Password" autofocus required>
            <button type="submit">Login</button>
        </form>
        <a href="/">Back to Portal</a>
    </div>
</body>
</html>
