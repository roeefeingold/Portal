<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Risk Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0a0e27 0%, #0d1537 40%, #111d4a 100%);
            color: #e0e6f0;
            min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
        }
        body::before {
            content: '';
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background:
                radial-gradient(ellipse at 30% 50%, rgba(30, 60, 150, 0.12) 0%, transparent 50%),
                radial-gradient(ellipse at 70% 30%, rgba(50, 80, 180, 0.08) 0%, transparent 50%);
            pointer-events: none; z-index: 0;
        }
        .login-box {
            position: relative; z-index: 1;
            background: linear-gradient(160deg, rgba(20, 30, 70, 0.7) 0%, rgba(15, 22, 55, 0.8) 100%);
            border: 1px solid rgba(255, 255, 255, 0.06);
            padding: 48px 40px; border-radius: 20px;
            width: 400px; text-align: center;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }
        .login-logo {
            width: 52px; height: 52px; margin: 0 auto 20px;
            background: linear-gradient(135deg, #2563eb, #4f8fff);
            border-radius: 14px;
            display: flex; align-items: center; justify-content: center;
            font-weight: 700; font-size: 1.3rem; color: #fff;
            box-shadow: 0 6px 20px rgba(37, 99, 235, 0.3);
        }
        .login-box h2 {
            font-size: 1.5rem; font-weight: 700; color: #fff;
            margin-bottom: 8px; letter-spacing: -0.5px;
        }
        .login-box .subtitle {
            color: rgba(255, 255, 255, 0.3); font-size: 0.9rem;
            margin-bottom: 32px;
        }
        .login-box input[type="password"] {
            width: 100%; padding: 14px 16px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px; background: rgba(255, 255, 255, 0.04);
            color: #e0e6f0; font-size: 1rem; font-family: 'Inter', sans-serif;
            margin-bottom: 16px; transition: border-color 0.2s;
        }
        .login-box input[type="password"]:focus {
            outline: none; border-color: rgba(37, 99, 235, 0.5);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }
        .login-box button {
            width: 100%; padding: 14px;
            background: linear-gradient(135deg, #2563eb, #1d4ed8);
            color: #fff; border: none; border-radius: 12px;
            font-size: 1rem; font-weight: 600; cursor: pointer;
            font-family: 'Inter', sans-serif;
            box-shadow: 0 4px 15px rgba(37, 99, 235, 0.3);
            transition: all 0.2s;
        }
        .login-box button:hover {
            box-shadow: 0 6px 25px rgba(37, 99, 235, 0.5);
            transform: translateY(-1px);
        }
        .flash { color: #ef4444; margin-bottom: 16px; font-size: 0.9rem; font-weight: 500; }
        .back-link {
            display: inline-block; margin-top: 24px;
            color: rgba(255, 255, 255, 0.3); text-decoration: none;
            font-size: 0.85rem; transition: color 0.2s;
        }
        .back-link:hover { color: rgba(255, 255, 255, 0.6); }
    </style>
</head>
<body>
    <div class="login-box">
        <div class="login-logo">R</div>
        <h2>Admin Access</h2>
        <p class="subtitle">Risk Portal Administration</p>
        {% with messages = get_flashed_messages() %}
        {% if messages %}
            {% for msg in messages %}
                <div class="flash">{{ msg }}</div>
            {% endfor %}
        {% endif %}
        {% endwith %}
        <form method="POST">
            <input type="password" name="password" placeholder="Enter password" autofocus required>
            <button type="submit">Sign In</button>
        </form>
        <a href="/" class="back-link">&larr; Back to Portal</a>
    </div>
</body>
</html>
