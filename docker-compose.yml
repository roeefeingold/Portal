services:
  portal-db:
    image: postgres:16-alpine
    container_name: portal-db
    hostname: portal-db
    environment:
      POSTGRES_USER: portal
      POSTGRES_PASSWORD: portal
      POSTGRES_DB: portal
    volumes:
      - portal-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U portal"]
      interval: 2s
      timeout: 3s
      retries: 10
    networks:
      - portal-net
    restart: unless-stopped

  portal-web:
    build: .
    container_name: portal-web
    hostname: portal-web
    ports:
      - "8000:8000"
    environment:
      POSTGRES_USER: portal
      POSTGRES_PASSWORD: portal
      POSTGRES_HOST: portal-db
      POSTGRES_DB: portal
      ADMIN_PASSWORD: admin3
      SECRET_KEY: change-me-in-production
    volumes:
      - portal-uploads:/app/static/uploads
    depends_on:
      portal-db:
        condition: service_healthy
    networks:
      - portal-net
    restart: unless-stopped

networks:
  portal-net:
    name: portal-net

volumes:
  portal-pgdata:
    name: portal-pgdata
  portal-uploads:
    name: portal-uploads
